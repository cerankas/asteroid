<!doctype html>
<html lang="en">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroid</title>
  
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    
    <style>
      .material-symbols-outlined {font-size:48px; cursor:pointer;}
      body {height:100dvh; overflow:hidden; background-color:black; color:white; font-family:Arial,Helvetica,sans-serif; font-size:xx-large; margin:0; touch-action:none; user-select:none;}
    </style>
  
  </head>
  <body>  
  
    <canvas id="canvas"></canvas>
    
    <div id="score" style="position:absolute; top:10px; left:10px; pointer-events:none;"></div>
    
    <div id="icons" style="position:absolute; top:10px; right:10px;">
      <span id="pause" title="Pause" class="material-symbols-outlined">pause</span>
      <span id="play" title="Play" class="material-symbols-outlined" style="display:none;">play_arrow</span>
      <span id="restart" title="Restart" class="material-symbols-outlined" style="display:none;">undo</span>
      <span id="speaker" title="Mute" class="material-symbols-outlined">volume_up</span>
      <span id="muted" title="Unmute" class="material-symbols-outlined" style="display:none;">volume_off</span>
      <span id="fullscreen" title="Fullscreen" class="material-symbols-outlined">fullscreen</span>
      <span id="windowed" title="Exit fullscreen" class="material-symbols-outlined" style="display:none;">fullscreen_exit</span>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  
  </body>
</html>
